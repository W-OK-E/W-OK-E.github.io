<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About – Ωμ</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #fff;
      color: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      height: 100vh;
      overflow: hidden;
    }

    h1 {
      margin-top: 2rem;
      font-size: 2.5rem;
      font-weight: bold;
      font-family: 'Courier New', Courier, monospace;
    }

    .tagline {
      font-style: italic;
      color: #666;
      margin-bottom: 1rem;
    }

    .graph-container {
      flex: 1;
      width: 100%;
      overflow-x: auto;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    svg {
      height: 300px;
      width: 1000px;
    }

    .edge {
      stroke: #8B4513;
      stroke-width: 3;
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: grow 2s ease-out forwards;
    }

    .edge:nth-of-type(1) { animation-delay: 0.4s; }
    .edge:nth-of-type(2) { animation-delay: 0.8s; }
    .edge:nth-of-type(3) { animation-delay: 1.2s; }

    @keyframes grow {
      to { stroke-dashoffset: 0; }
    }

    .node {
      fill: #4CAF50;
      cursor: pointer;
      opacity: 0;
      animation: appear 0.3s ease forwards;
    }

    .node:nth-of-type(1) { animation-delay: 2s; }
    .node:nth-of-type(2) { animation-delay: 2.3s; }
    .node:nth-of-type(3) { animation-delay: 2.6s; }

    @keyframes appear {
      to { opacity: 1; }
    }

    .label {
      font-size: 14px;
      fill: #333;
      opacity: 0;
      animation: appear 0.3s ease forwards;
    }

    .label:nth-of-type(1) { animation-delay: 2.2s; }
    .label:nth-of-type(2) { animation-delay: 2.5s; }
    .label:nth-of-type(3) { animation-delay: 2.8s; }

    .tooltip {
      position: absolute;
      background: #fff;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 5px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      font-size: 14px;
    }

    footer {
      margin: 1rem 0;
      font-size: 0.85rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <h1>/Ωμ/</h1>
  <p class="tagline">Academic Graph: A Landscape Journey</p>

  <div class="graph-container">
    <svg viewBox="0 0 1000 300">
      <!-- Edges -->
      <line class="edge" x1="100" y1="150" x2="300" y2="150"/>
      <line class="edge" x1="300" y1="150" x2="500" y2="100"/>
      <line class="edge" x1="300" y1="150" x2="500" y2="200"/>

      <!-- Nodes -->
      <circle class="node" cx="100" cy="150" r="10" data-info="High School: Science Stream"/>
      <circle class="node" cx="300" cy="150" r="10" data-info="B.Tech in CS: 2018-2022"/>
      <circle class="node" cx="500" cy="100" r="10" data-info="Research Intern: Summer 2021"/>
      <circle class="node" cx="500" cy="200" r="10" data-info="Hackathons: Various AI & Bio Projects"/>

      <!-- Labels -->
      <text class="label" x="100" y="135">High School</text>
      <text class="label" x="300" y="135">B.Tech</text>
      <text class="label" x="500" y="85">Internship</text>
      <text class="label" x="500" y="220">Hackathons</text>
    </svg>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <footer>© 2025 Om Kumar · Academic Graph</footer>

  <script>
    const tooltip = document.getElementById('tooltip');
    const nodes = document.querySelectorAll('.node');

    nodes.forEach(node => {
      node.addEventListener('mouseenter', () => {
        tooltip.innerText = node.dataset.info;
        tooltip.style.opacity = 1;
      });

      node.addEventListener('mousemove', (e) => {
        tooltip.style.top = (e.pageY + 15) + 'px';
        tooltip.style.left = (e.pageX + 15) + 'px';
      });

      node.addEventListener('mouseleave', () => {
        tooltip.style.opacity = 0;
      });
    });
  </script>
</body>
</html>
