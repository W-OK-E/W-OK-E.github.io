<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>About – Ωμ</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #fff;
      color: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      height: 100vh;
      overflow: hidden;
    }

    h1 {
      margin-top: 2rem;
      font-size: 2.5rem;
      font-weight: bold;
      font-family: 'Courier New', Courier, monospace;
    }

    .tagline {
      font-style: italic;
      color: #666;
      margin-bottom: 2rem;
    }

    .tree-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    svg {
      width: 90%;
      max-width: 600px;
      height: auto;
    }

    .trunk, .branch {
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: grow 2s ease-out forwards;
    }

    .trunk {
      animation-delay: 0.2s;
    }

    .branch:nth-of-type(1) { animation-delay: 0.6s; }
    .branch:nth-of-type(2) { animation-delay: 1s; }
    .branch:nth-of-type(3) { animation-delay: 1.4s; }

    @keyframes grow {
      to {
        stroke-dashoffset: 0;
      }
    }

    .node {
      fill: #4CAF50;
      cursor: pointer;
      opacity: 0;
      animation: appear 0.3s ease forwards;
    }

    .node:nth-of-type(1) { animation-delay: 2s; }
    .node:nth-of-type(2) { animation-delay: 2.3s; }
    .node:nth-of-type(3) { animation-delay: 2.6s; }

    @keyframes appear {
      to {
        opacity: 1;
      }
    }

    .node:hover {
      transform: scale(1.1);
    }

    .label {
      font-size: 14px;
      text-anchor: middle;
      fill: #333;
      opacity: 0;
      animation: appear 0.3s ease forwards;
    }

    .label:nth-of-type(1) { animation-delay: 2.2s; }
    .label:nth-of-type(2) { animation-delay: 2.5s; }
    .label:nth-of-type(3) { animation-delay: 2.8s; }

    .tooltip {
      position: absolute;
      background: #fff;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 5px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      font-size: 14px;
    }

    footer {
      margin: 1rem 0;
      font-size: 0.85rem;
      color: #aaa;
    }
  </style>
</head>
<body>

  <h1>/Ωμ/</h1>
  <p class="tagline">Academic Journey: A Tree in Bloom</p>

  <div class="tree-container">
    <svg viewBox="0 0 300 400">
      <!-- Trunk -->
      <line class="trunk" x1="150" y1="350" x2="150" y2="200" stroke="#8B4513" stroke-width="10"/>

      <!-- Branches -->
      <line class="branch" x1="150" y1="250" x2="100" y2="180" stroke="#8B4513" stroke-width="4"/>
      <line class="branch" x1="150" y1="240" x2="200" y2="150" stroke="#8B4513" stroke-width="4"/>
      <line class="branch" x1="150" y1="220" x2="130" y2="100" stroke="#8B4513" stroke-width="3"/>

      <!-- Nodes -->
      <circle class="node" cx="100" cy="180" r="8" data-info="High School: 2016–2018 – Science stream with focus on Math and CS"/>
      <circle class="node" cx="200" cy="150" r="8" data-info="Bachelor's: 2018–2022 – B.Tech in Computer Science at XYZ University"/>
      <circle class="node" cx="130" cy="100" r="8" data-info="Research Internship: Summer 2021 – AI for Bioinformatics at ABC Lab"/>

      <!-- Labels -->
      <text class="label" x="100" y="170">High School</text>
      <text class="label" x="200" y="140">B.Tech</text>
      <text class="label" x="130" y="90">Internship</text>
    </svg>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <footer>© 2025 Om Kumar · Academic Tree</footer>

  <script>
    const tooltip = document.getElementById('tooltip');
    const nodes = document.querySelectorAll('.node');

    nodes.forEach(node => {
      node.addEventListener('mouseenter', (e) => {
        tooltip.innerText = node.dataset.info;
        tooltip.style.opacity = 1;
      });

      node.addEventListener('mousemove', (e) => {
        tooltip.style.top = (e.pageY + 15) + 'px';
        tooltip.style.left = (e.pageX + 15) + 'px';
      });

      node.addEventListener('mouseleave', () => {
        tooltip.style.opacity = 0;
      });
    });
  </script>

</body>
</html>
