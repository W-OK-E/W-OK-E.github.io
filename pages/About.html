<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About – Ωμ</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #fff;
      color: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      height: 100vh;
      overflow: hidden;
    }

    h1 {
      margin-top: 2rem;
      font-size: 2.5rem;
      font-weight: bold;
      font-family: 'Courier New', Courier, monospace;
    }

    .tagline {
      font-style: italic;
      color: #666;
      margin-bottom: 1rem;
    }

    .graph-container {
      flex: 1;
      width: 100%;
      overflow-x: auto;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    svg {
      height: 400px;
      width: 1400px;
    }

    .edge {
      stroke: #444;
      stroke-width: 2;
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: grow 2s ease-out forwards;
    }

    .edge:nth-of-type(1) { animation-delay: 0.4s; }
    .edge:nth-of-type(2) { animation-delay: 0.8s; }
    .edge:nth-of-type(3) { animation-delay: 1.2s; }
    .edge:nth-of-type(4) { animation-delay: 1.6s; }
    .edge:nth-of-type(5) { animation-delay: 2.0s; }
    .edge:nth-of-type(6) { animation-delay: 2.4s; }
    .edge:nth-of-type(7) { animation-delay: 2.8s; }
    .edge:nth-of-type(8) { animation-delay: 3.2s; }

    @keyframes grow {
      to { stroke-dashoffset: 0; }
    }

    .node {
      fill: #1a73e8;
      cursor: pointer;
      opacity: 0;
      animation: appear 0.3s ease forwards;
    }

    .node:nth-of-type(1) { animation-delay: 2s; }
    .node:nth-of-type(2) { animation-delay: 2.3s; }
    .node:nth-of-type(3) { animation-delay: 2.6s; }
    .node:nth-of-type(4) { animation-delay: 2.9s; }
    .node:nth-of-type(5) { animation-delay: 3.2s; }
    .node:nth-of-type(6) { animation-delay: 3.5s; }
    .node:nth-of-type(7) { animation-delay: 3.8s; }
    .node:nth-of-type(8) { animation-delay: 4.1s; }
    .node:nth-of-type(9) { animation-delay: 4.4s; }

    @keyframes appear {
      to { opacity: 1; }
    }

    .label {
      font-size: 14px;
      fill: #333;
      opacity: 0;
      animation: appear 0.3s ease forwards;
    }

    .tooltip {
      position: absolute;
      background: #fff;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 5px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      font-size: 14px;
    }

    footer {
      margin: 1rem 0;
      font-size: 0.85rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <h1>/Ωμ/</h1>
  <p class="tagline">Academic Graph: A Landscape Journey</p>

  <div class="graph-container">
    <svg viewBox="0 0 1400 400">
      <!-- Edges -->
      <line class="edge" x1="100" y1="200" x2="250" y2="200"/>
      <line class="edge" x1="250" y1="200" x2="400" y2="200"/>
      <line class="edge" x1="400" y1="200" x2="600" y2="200"/>

      <line class="edge" x1="600" y1="200" x2="800" y2="100"/>
      <line class="edge" x1="600" y1="200" x2="800" y2="150"/>
      <line class="edge" x1="600" y1="200" x2="800" y2="200"/>
      <line class="edge" x1="600" y1="200" x2="800" y2="250"/>
      <line class="edge" x1="600" y1="200" x2="800" y2="300"/>

      <!-- Nodes -->
      <circle class="node" cx="100" cy="200" r="10" data-info="Secondary Education - When you could just lay back and enjoy"/>
      <circle class="node" cx="250" cy="200" r="10" data-info="NIOS - Quite Unexpected twist trust me"/>
      <circle class="node" cx="400" cy="200" r="10" data-info="Wasn't too sure, but hasn't disappointed"/>

      <circle class="node" cx="800" cy="100" r="10" data-info="Remote Research Intern"/>
      <circle class="node" cx="800" cy="150" r="10" data-info="Summer Research Intern"/>
      <circle class="node" cx="800" cy="200" r="10" data-info="Best Place tbh"/>
      <circle class="node" cx="800" cy="250" r="10" data-info="Awesome People ngl"/>
      <circle class="node" cx="800" cy="300" r="10" data-info="An addition I don't regret."/>

      <!-- Labels -->
      <text class="label" x="80" y="185">St.Ann's</text>
      <text class="label" x="230" y="185">NIOS</text>
      <text class="label" x="380" y="185">MIT Manipal</text>
      <text class="label" x="780" y="90">IIT-Kgp</text>
      <text class="label" x="780" y="140">Netweb</text>
      <text class="label" x="780" y="190">MANAS</text>
      <text class="label" x="780" y="240">IAESTE</text>
      <text class="label" x="800" y="290">E-Cell & RSM</text>
    </svg>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <footer>© 2025 Om Kumar · Academic Graph</footer>

  <script>
    const tooltip = document.getElementById('tooltip');
    const nodes = document.querySelectorAll('.node');

    nodes.forEach(node => {
      node.addEventListener('mouseenter', () => {
        tooltip.innerText = node.dataset.info;
        tooltip.style.opacity = 1;
      });

      node.addEventListener('mousemove', (e) => {
        tooltip.style.top = (e.pageY + 15) + 'px';
        tooltip.style.left = (e.pageX + 15) + 'px';
      });

      node.addEventListener('mouseleave', () => {
        tooltip.style.opacity = 0;
      });
    });
  </script>
</body>
</html>
