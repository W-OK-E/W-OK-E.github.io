<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Image Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }
        
        header {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 20px 0;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 columns */
            gap: 20px; /* Gap between images */
        }

        .image {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px; /* Set a fixed height for each image container */
            background-color: #fff; /* Optional: Add a white background */
            border: 2px solid #333;
        }

        .image img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* Maintain image aspect ratio */
        }
    </style>
</head>
<body>
    <header>
        <h1>Stalking Beauty, Wherever I go!</h1>
    </header>
