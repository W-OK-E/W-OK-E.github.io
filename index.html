<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ωμ — Om Portfolio</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #fff;
      color: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    main {
      max-width: 90%;
    }

    .image-container {
      margin-bottom: 1.5rem;
    }

    .image-container img {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    h1 {
      font-size: 2.5rem;
      font-weight: bold;
      font-family: 'Courier New', Courier, monospace;
      margin-bottom: 0.5rem;
    }

    .tagline {
      font-style: italic;
      color: #666;
      margin-bottom: 2rem;
    }

    nav a {
      display: block;
      font-size: 1.2rem;
      margin: 0.5rem 0;
      text-decoration: none;
      color: #333;
      transition: color 0.3s ease;
    }

    nav a:hover {
      color: #000;
    }

    footer {
      margin-top: 2rem;
      font-size: 0.85rem;
      color: #aaa;
    }

    .rss {
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <main>
    <div class="image-container">
      <img src="site_assets/Profile.jpg" alt="Profile Image" />
    </div>
    <h1>/Ωμ/</h1>
    <p class="tagline">Student | Engineer | Teacher &lt;3</p>
    <nav>
      <a href="pages/Track.html">Blog</a>

    </footer>
  </main>
</body>
</html>
