<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ωμ — Om Portfolio</title>
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    integrity="sha512-yH0iKzN5YcxFddYxNdI2QeStNHnKjz3X9cYxMdrFlLEMoR+K9JId0bGRkNQgZhaD7ZqPqHe1bE2J10k5z9Zalg=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #fff;
      color: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    main {
      max-width: 90%;
    }

    .image-container {
      margin-bottom: 1.5rem;
    }

    .image-container img {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    h1 {
      font-size: 2.5rem;
      font-weight: bold;
      font-family: 'Courier New', Courier, monospace;
      margin-bottom: 0.5rem;
    }

    .tagline {
      font-style: italic;
      color: #666;
      margin-bottom: 2rem;
    }

    nav a {
      display: block;
      font-size: 1.2rem;
      margin: 0.5rem 0;
      text-decoration: none;
      color: #333;
      transition: color 0.3s ease;
    }

    nav a:hover {
      color: #000;
    }

    .socials {
      margin-top: 1.5rem;
    }

    .socials a {
      margin: 0 10px;
      color: #444;
      font-size: 1.5rem;
      transition: color 0.3s ease;
    }

    .socials a:hover {
      color: #000;
    }

    footer {
      margin-top: 2rem;
      font-size: 0.85rem;
      color: #aaa;
    }

    .rss {
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <main>
    <div class="image-container">
      <img src="site_assets/Profile.jpg" alt="Profile Image" />
    </div>
    <h1>/Ωμ/</h1>
    <p class="tagline">Student | Engineer | Teacher &lt;3</p>
    <nav>
      <a href="pages/Track.html">Blog</a>
      <a href="pages/About.html">About</a>
    </nav>

    <div class="socials">
      <a href="https://in.pinterest.com/okhere21/_created" target="_blank" title="Pinterest">
        <i class="fab fa-pinterest"></i>
      </a>
      <a href="https://github.com/okhere21" target="_blank" title="GitHub">
        <i class="fab fa-github"></i>
      </a>
      <a href="https://www.linkedin.com/in/your-linkedin/" target="_blank" title="LinkedIn">
        <i class="fab fa-linkedin"></i>
      </a>
      <a href="https://www.instagram.com/your-instagram/" target="_blank" title="Instagram">
        <i class="fab fa-instagram"></i>
      </a>
    </div>

    <footer>
      © 2025 Om Kumar · · Portfolio · <span class="rss">📡</span>
    </footer>
  </main>
</body>
</html>
